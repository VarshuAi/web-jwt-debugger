<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleek JWT Debugger & Decoder</title>
    <style>
        body { background: #050505; color: #00FF88; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #000; color: #00FF88; border: 1px solid #003318; padding: 10px; font-family: monospace; }
        .box { background: rgba(0, 51, 24, 0.2); border: 1px solid #003318; border-radius: 8px; padding: 15px; margin-top: 15px; }
        h3 { color: #FFB800; margin-top: 0; }
        pre { white-space: pre-wrap; margin: 0; }
    </style>
    <script>
        function decodeJWT() {
            const token = document.getElementById('token').value.trim();
            const parts = token.split('.');
            if (parts.length !== 3) {
                document.getElementById('output').innerHTML = "[-] Invalid JWT Token Format.";
                return;
            }
            try {
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                
                document.getElementById('header-out').textContent = JSON.stringify(header, null, 2);
                document.getElementById('payload-out').textContent = JSON.stringify(payload, null, 2);
                document.getElementById('sig-out').textContent = parts[2];
            } catch (e) {
                document.getElementById('output').innerHTML = "[-] Error decoding token payload: " + e.message;
            }
        }
    </script>
</head>
<body>
    <h2>[+] OFFLINE JWT DEBUGGER & DECODER</h2>
    <textarea id="token" placeholder="Paste your JWT token here..." oninput="decodeJWT()"></textarea>
    
    <div class="box">
        <h3>[HEADER: ALGORITHM & TOKEN TYPE]</h3>
        <pre id="header-out">Waiting for input...</pre>
    </div>
    
    <div class="box">
        <h3>[PAYLOAD: DATA]</h3>
        <pre id="payload-out">Waiting for input...</pre>
    </div>

    <div class="box">
        <h3>[SIGNATURE HASH]</h3>
        <pre id="sig-out">Waiting for input...</pre>
    </div>
</body>
</html>
